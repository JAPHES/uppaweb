{% load static %}
<style>
  .uppa-navbar {
    background: linear-gradient(120deg, #14005d, #1d0079 55%, #2d0fa6);
    box-shadow: 0 8px 28px rgba(12, 18, 38, 0.2);
  }
  .uppa-brand {
    color: #ffbe3b;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 1.05rem;
  }
  .uppa-brand:hover {
    color: #ffd77d;
  }
  .uppa-logo {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ffbe3b;
    box-shadow: 0 0 0 3px rgba(255, 190, 59, 0.18);
  }
  .uppa-navbar .nav-link {
    color: #eef3ff;
    font-weight: 600;
    margin-left: 0.3rem;
    margin-right: 0.3rem;
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    transition: all 0.2s ease;
  }
  .uppa-navbar .nav-link:hover,
  .uppa-navbar .nav-link.active {
    color: #111827;
    background: #ffbe3b;
  }
  .uppa-navbar .navbar-toggler {
    border-color: rgba(255, 255, 255, 0.4);
  }
  .uppa-navbar .navbar-toggler:focus {
    box-shadow: none;
  }
  .uppa-navbar .navbar-toggler-icon {
    filter: invert(1) saturate(0) brightness(180%);
  }
</style>

<nav class="navbar navbar-expand-lg uppa-navbar sticky-top">
  <div class="container py-2">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
      <img src="{% static 'images/uppalogo.jpg' %}" alt="UPPA" class="uppa-logo">
      <span class="uppa-brand">Explore UPPA</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#uppaNav" aria-controls="uppaNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="uppaNav">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'departments' %}">Departments</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'projects' %}">Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'team' %}">Team</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
